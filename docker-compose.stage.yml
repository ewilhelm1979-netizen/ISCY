services:
  app:
    environment:
      RUST_BACKEND_BIND: "0.0.0.0:9000"
      ISCY_APP_MODE: "demo"
      ISCY_TRUST_PROXY_IDENTITY_HEADERS: "0"
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    volumes:
      - media_data:/app/media

  reverse-proxy:
    image: nginx:1.31-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      NGINX_HOST: ${NGINX_HOST:-stage.localhost}
      NGINX_CLIENT_MAX_BODY_SIZE: ${NGINX_CLIENT_MAX_BODY_SIZE:-50m}
      NGINX_PROXY_READ_TIMEOUT: ${NGINX_PROXY_READ_TIMEOUT:-300}
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/health/live || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s
