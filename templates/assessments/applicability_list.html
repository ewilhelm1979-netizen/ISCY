{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3"><h1 class="h3">Betroffenheitsanalyse</h1><a class="btn btn-primary" href="{% url 'assessments:applicability_create' %}">Neue Analyse</a></div>
<div class="v19-glass-card"><div class="table-responsive"><table class="table table-striped mb-0"><thead><tr><th>Tenant</th><th>Sektor</th><th>Status</th><th>Erstellt</th></tr></thead><tbody>
{% for item in items %}
<tr><td>{{ item.tenant }}</td><td>{{ item.sector }}</td><td>{{ item.get_status_display }}</td><td>{{ item.created_at }}</td></tr>
{% empty %}
<tr><td colspan="4">Noch keine Analysen.</td></tr>
{% endfor %}
</tbody></table></div></div>
{% endblock %}
