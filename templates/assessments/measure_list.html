{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3"><h1 class="h3">Maßnahmen</h1><a class="btn btn-primary" href="{% url 'assessments:measure_create' %}">Neue Maßnahme</a></div>
<div class="v19-glass-card"><div class="table-responsive"><table class="table table-striped mb-0"><thead><tr><th>Titel</th><th>Priority</th><th>Status</th><th>Due Date</th></tr></thead><tbody>
{% for item in items %}
<tr><td>{{ item.title }}</td><td>{{ item.get_priority_display }}</td><td>{{ item.get_status_display }}</td><td>{{ item.due_date|default:'-' }}</td></tr>
{% empty %}
<tr><td colspan="4">Noch keine Maßnahmen.</td></tr>
{% endfor %}
</tbody></table></div></div>
{% endblock %}
