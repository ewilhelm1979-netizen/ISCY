{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3"><h1 class="h3">Assessments</h1><a class="btn btn-primary" href="{% url 'assessments:create' %}">Neues Assessment</a></div>
<div class="v19-glass-card"><div class="table-responsive"><table class="table table-striped mb-0"><thead><tr><th>Prozess</th><th>Requirement</th><th>Status</th><th>Score</th></tr></thead><tbody>
{% for item in items %}
<tr><td>{{ item.process }}</td><td>{{ item.requirement }}</td><td>{{ item.get_status_display }}</td><td>{{ item.score }}</td></tr>
{% empty %}
<tr><td colspan="4">Noch keine Assessments.</td></tr>
{% endfor %}
</tbody></table></div></div>
{% endblock %}
