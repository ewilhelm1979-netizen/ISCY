services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-isms}
      POSTGRES_USER: ${POSTGRES_USER:-isms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-isms}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-isms} -d ${POSTGRES_DB:-isms}"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ./rust/iscy-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      RUST_BACKEND_BIND: "0.0.0.0:9000"
      DATABASE_URL: ${DATABASE_URL:-postgresql://isms:isms@db:5432/isms}
      ISCY_MEDIA_ROOT: ${ISCY_MEDIA_ROOT:-/app/media}
      NVD_API_BASE_URL: ${NVD_API_BASE_URL:-https://services.nvd.nist.gov}
      NVD_API_KEY: ${NVD_API_KEY:-}
    ports:
      - "${ISCY_HTTP_PORT:-9000}:9000"
    volumes:
      - media_data:/app/media
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:9000/health/live || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  media_data:
