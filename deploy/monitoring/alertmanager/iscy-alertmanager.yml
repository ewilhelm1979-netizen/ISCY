global:
  resolve_timeout: 5m

route:
  receiver: iscy-operations
  group_by:
    - alertname
    - service
    - severity
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - receiver: iscy-critical
      matchers:
        - severity="critical"
      repeat_interval: 30m

receivers:
  - name: iscy-operations
    webhook_configs:
      - url: http://host.docker.internal:9000/api/v1/operations/alertmanager
        send_resolved: true
        # Wenn ISCY_ALERTMANAGER_TOKEN gesetzt ist, hier denselben Wert hinterlegen.
        # http_config:
        #   authorization:
        #     type: Bearer
        #     credentials: change-me

  - name: iscy-critical
    webhook_configs:
      - url: http://host.docker.internal:9000/api/v1/operations/alertmanager
        send_resolved: true
        # Wenn ISCY_ALERTMANAGER_TOKEN gesetzt ist, hier denselben Wert hinterlegen.
        # http_config:
        #   authorization:
        #     type: Bearer
        #     credentials: change-me

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal:
      - service
