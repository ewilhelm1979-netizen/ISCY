groups:
  - name: iscy-operations
    rules:
      - alert: ISCYOperationsCritical
        expr: iscy_operations_exit_code == 2
        for: 5m
        labels:
          severity: critical
          service: iscy
        annotations:
          summary: "ISCY meldet kritischen Betriebsstatus"
          description: "Mindestens ein ISCY Operations-Signal ist kritisch. Statusseite: /status/"

      - alert: ISCYOperationsWarning
        expr: iscy_operations_exit_code == 1
        for: 30m
        labels:
          severity: warning
          service: iscy
        annotations:
          summary: "ISCY meldet offene Warnsignale"
          description: "ISCY hat Warnsignale wie fehlende Runtime-Flags, offene CVE-Reviews oder Evidence-Luecken."

      - alert: ISCYOperationsIssuesGrowing
        expr: iscy_operations_issue_count > 0
        for: 45m
        labels:
          severity: warning
          service: iscy
        annotations:
          summary: "ISCY Operations-Issues bleiben offen"
          description: "iscy_operations_issue_count ist seit 45 Minuten groesser 0."

      - alert: ISCYMissingRustModule
        expr: iscy_operations_module_configured == 0
        for: 15m
        labels:
          severity: warning
          service: iscy
        annotations:
          summary: "Ein ISCY Rust-Modul ist nicht verbunden"
          description: "Mindestens ein erwarteter Rust-Store oder fachliches Modul ist nicht konfiguriert."

      - alert: ISCYMigrationIncomplete
        expr: iscy_operations_migration_applied < iscy_operations_migration_expected
        for: 10m
        labels:
          severity: warning
          service: iscy
        annotations:
          summary: "ISCY Datenbank-Migrationen sind nicht vollstaendig"
          description: "Die angewendeten Migrationen liegen unter dem erwarteten Schema-Stand."

      - alert: ISCYRustOnlyModeDisabled
        expr: iscy_operations_runtime_flag{name="rust_only"} == 0
        for: 10m
        labels:
          severity: warning
          service: iscy
        annotations:
          summary: "ISCY Rust-only-Modus ist nicht aktiv"
          description: "RUST_ONLY_MODE ist nicht gesetzt oder nicht aktiv."

      - alert: ISCYStrictModeDisabled
        expr: iscy_operations_runtime_flag{name="strict_mode"} == 0
        for: 30m
        labels:
          severity: warning
          service: iscy
        annotations:
          summary: "ISCY Strict Mode ist nicht aktiv"
          description: "RUST_STRICT_MODE ist nicht gesetzt oder nicht aktiv."

      - alert: ISCYAgentPolicyCritical
        expr: iscy_operations_signal{area="Agent Governance",signal="Agent-Policy-Konformitaet",level="critical"} == 2
        for: 5m
        labels:
          severity: critical
          service: iscy
        annotations:
          summary: "ISCY Agent-Policy ist kritisch verletzt"
          description: "Mindestens ein Agent-Policy-Profil meldet eine kritische Abweichung."

      - alert: ISCYAgentCoverageWarning
        expr: iscy_operations_signal{area="Agent Governance",signal="Agent-Sollabdeckung",level=~"warn|critical"} >= 1
        for: 30m
        labels:
          severity: warning
          service: iscy
        annotations:
          summary: "ISCY Agent-Sollabdeckung ist verfehlt"
          description: "Die frischen Agent-Meldungen liegen unter dem konfigurierten Sollbestand."
