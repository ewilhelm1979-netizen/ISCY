name: Update supply-chain installer

on:
  push:
    branches:
      - maintenance/application-readiness-v23.7.27
    paths:
      - .github/workflows/update-supply-chain-installer.yml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: maintenance/application-readiness-v23.7.27
      - name: Replace source builds with verified binaries
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/ci.yml')
          text = path.read_text()
          old = '''      - name: Install Rust supply-chain tools
        run: |
          cargo install cargo-audit --locked
          cargo install cargo-deny --locked
'''
          new = '''      - name: Install verified Rust supply-chain tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,cargo-deny
          fallback: none
'''
          if old not in text:
              raise SystemExit('expected install block not found')
          path.write_text(text.replace(old, new))
          PY
      - name: Commit update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/ci.yml
          git commit -m "Use verified prebuilt Rust supply-chain tools"
          git push origin HEAD:maintenance/application-readiness-v23.7.27
