name: Publish V23.7.27

on:
  push:
    branches: ["main"]
    paths:
      - "docs/releases/v23.7.27.md"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Create immutable GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view V23.7.27 --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release V23.7.27 already exists."
            exit 0
          fi
          gh release create V23.7.27 \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "ISCY V23.7.27" \
            --notes-file docs/releases/v23.7.27.md
