name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  django-core:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install app dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-prod.txt
      - name: Django checks and smoke setup
        env:
          SECRET_KEY: ci-secret-key
          DEBUG: 'True'
          DATABASE_URL: sqlite:///db.sqlite3
          RUST_BACKEND_URL: http://127.0.0.1:9000
          GUIDANCE_SCORING_BACKEND: local
          RISK_SCORING_BACKEND: local
          REPORT_SUMMARY_BACKEND: local
        run: |
          source .venv/bin/activate
          mkdir -p static media staticfiles
          python manage.py makemigrations --check --dry-run
          python manage.py migrate --noinput
          python manage.py seed_demo || true
          python manage.py seed_catalog || true
          python manage.py seed_requirements || true
          python manage.py seed_product_security || true
          make team-test
      - name: Django Rust-adapter seam checks
        env:
          SECRET_KEY: ci-secret-key
          DEBUG: 'True'
          DATABASE_URL: sqlite:///db.sqlite3
          RUST_BACKEND_URL: http://127.0.0.1:9000
          GUIDANCE_SCORING_BACKEND: rust_service
          RISK_SCORING_BACKEND: rust_service
          REPORT_SUMMARY_BACKEND: rust_service
        run: |
          source .venv/bin/activate
          python manage.py test \
            apps.guidance.tests.JourneyServiceTests \
            apps.vulnerability_intelligence.tests.RiskScoringBridgeTests

  nix-devshell:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Nix dev shell smoke test
        run: |
          nix develop --command bash -lc '
            export RUST_BACKEND_URL=http://127.0.0.1:9000
            export GUIDANCE_SCORING_BACKEND=local
            export RISK_SCORING_BACKEND=local
            export REPORT_SUMMARY_BACKEND=local
            python -m venv .venv-nix-ci
            source .venv-nix-ci/bin/activate
            python -m ensurepip --upgrade
            python -m pip install --upgrade pip setuptools wheel
            python -m pip install -r requirements.txt
            cp .env.example .env
            mkdir -p static media staticfiles
            make team-test
          '

  rust-backend-tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Run Rust backend tests
        run: |
          cargo test --manifest-path rust/iscy-backend/Cargo.toml

  docker-config:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Validate docker compose files
        run: |
          cp .env.example .env
          docker compose -f docker-compose.yml config
          docker compose -f docker-compose.yml -f docker-compose.llm.yml config
          docker compose -f docker-compose.yml -f docker-compose.stage.yml config
          docker compose -f docker-compose.yml -f docker-compose.prod.yml config
          docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.llm.yml config
