name: Update patched RustSec dependencies

on:
  push:
    branches:
      - maintenance/application-readiness-v23.7.27
    paths:
      - .github/workflows/update-rustsec-lock.yml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: maintenance/application-readiness-v23.7.27
      - uses: dtolnay/rust-toolchain@stable
      - name: Update patched transitive dependencies
        run: |
          cargo update --manifest-path rust/iscy-backend/Cargo.toml -p rustls-webpki --precise 0.103.13
          cargo update --manifest-path rust/iscy-backend/Cargo.toml -p quinn-proto --precise 0.11.15
      - name: Commit lockfile update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rust/iscy-backend/Cargo.lock
          git commit -m "Update patched RustSec dependencies"
          git push origin HEAD:maintenance/application-readiness-v23.7.27
