name: RustSec audit diagnostic

on:
  pull_request:
    paths:
      - "rust/iscy-backend/Cargo.lock"
      - "rust/iscy-backend/Cargo.toml"
      - ".github/workflows/audit-diagnostic.yml"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
          fallback: none
      - name: Regenerate lockfile and diagnostics
        run: |
          rm rust/iscy-backend/Cargo.lock
          cargo generate-lockfile --manifest-path rust/iscy-backend/Cargo.toml
          cargo audit --file rust/iscy-backend/Cargo.lock --json > audit-report.json || true
          {
            echo "=== rsa all targets ==="
            cargo tree --locked --manifest-path rust/iscy-backend/Cargo.toml --target all -i rsa || true
            echo "=== quinn-proto all targets ==="
            cargo tree --locked --manifest-path rust/iscy-backend/Cargo.toml --target all -i quinn-proto || true
            echo "=== rustls-webpki all targets ==="
            cargo tree --locked --manifest-path rust/iscy-backend/Cargo.toml --target all -i rustls-webpki || true
          } > dependency-paths.txt
      - uses: actions/upload-artifact@v4
        with:
          name: rustsec-regenerated-lock-diagnostic
          path: |
            rust/iscy-backend/Cargo.lock
            audit-report.json
            dependency-paths.txt
          if-no-files-found: error
