name: RustSec audit diagnostic

on:
  pull_request:
    paths:
      - "rust/iscy-backend/Cargo.lock"
      - "rust/iscy-backend/Cargo.toml"
      - ".github/workflows/audit-diagnostic.yml"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
          fallback: none
      - name: Export audit and dependency reports
        run: |
          cargo audit --file rust/iscy-backend/Cargo.lock --json > audit-report.json || true
          {
            echo "=== rsa ==="
            cargo tree --manifest-path rust/iscy-backend/Cargo.toml -i rsa || true
            echo "=== quinn-proto ==="
            cargo tree --manifest-path rust/iscy-backend/Cargo.toml -i quinn-proto || true
            echo "=== rustls-webpki ==="
            cargo tree --manifest-path rust/iscy-backend/Cargo.toml -i rustls-webpki || true
          } > dependency-paths.txt
      - uses: actions/upload-artifact@v4
        with:
          name: rustsec-audit-report
          path: |
            audit-report.json
            dependency-paths.txt
          if-no-files-found: error
