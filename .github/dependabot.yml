version: 2

updates:
  # Rust dependencies from Cargo.toml and Cargo.lock
  - package-ecosystem: "cargo"
    directory: "/rust/iscy-backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5

  # Base images used by rust/iscy-backend/Dockerfile
  - package-ecosystem: "docker"
    directory: "/rust/iscy-backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:15"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 3

  # Root application stack and monitoring stack
  - package-ecosystem: "docker-compose"
    directories:
      - "/"
      - "/deploy/monitoring"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:30"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5

  # Nix flake inputs from flake.lock
  - package-ecosystem: "nix"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:45"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 3

  # Actions referenced in .github/workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 3
