services:
  app:
    environment:
      LOCAL_LLM_MODEL_NAME: ${LOCAL_LLM_MODEL_NAME:-iscy-rust-llm}
      LOCAL_LLM_N_CTX: ${LOCAL_LLM_N_CTX:-8192}
      LOCAL_LLM_N_THREADS: ${LOCAL_LLM_N_THREADS:-8}
      LOCAL_LLM_GPU_LAYERS: ${LOCAL_LLM_GPU_LAYERS:-0}
    volumes:
      - media_data:/app/media
